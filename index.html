<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSearch | Movie Finder</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="header-actions">
        <button id="themeToggle" class="secondary-btn">🌙 Dark Mode</button>
    </div>
        <h1>🎬 CineSearch</h1>
        <div class="search-box">
            <input type="text" id="movieInput" placeholder="Search for a movie (e.g. Batman)...">
            <button id="searchBtn">Search</button>
        </div>

        <div id="results" class="movie-grid"></div>
        
        <div id="loader" class="hidden">Searching the database...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
